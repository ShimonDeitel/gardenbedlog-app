name: GardenBedLog
options:
  bundleIdPrefix: com.shimondeitel.gardenbedlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  GardenBedLog:
    type: application
    platform: iOS
    sources:
      - path: GardenBedLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenbedlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: GardenBedLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GardenBedLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GardenBedLogTests
      - path: GardenBedLog.storekit
    dependencies:
      - target: GardenBedLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenbedlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GardenBedLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GardenBedLogUITests
    dependencies:
      - target: GardenBedLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenbedlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  GardenBedLog:
    build:
      targets:
        GardenBedLog: all
        GardenBedLogTests: [test]
        GardenBedLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: GardenBedLog.storekit
    test:
      config: Debug
      storeKitConfiguration: GardenBedLog.storekit
      targets:
        - GardenBedLogTests
        - GardenBedLogUITests
    archive:
      config: Release
